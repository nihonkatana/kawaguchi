<!doctype html>
<html lang="ja">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>掲示場ナビ道</title>

    <style>
        :root {
            --primary: #1b3c78;
            --bg: #f5f7fb;
            --card: #ffffff;
            --border: #d9e0ef;
            --text: #1f2a44;
            --muted: #5f6b88;
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        /* 上部帯 */
        .header-bar {
            background: var(--primary);
            color: #fff;
            padding: 14px 16px;
        }

        .header-inner {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo {
            width: 36px;
            height: 36px;
            object-fit: contain;
            background: #ffffff22;
            border-radius: 6px;
            padding: 4px;
        }

        .title {
            font-size: clamp(18px, 4.5vw, 24px);
            font-weight: 700;
            letter-spacing: .03em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* 本文エリア */
        .container {
            max-width: 900px;
            margin: 32px auto;
            padding: 0 16px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 28px 22px;
        }

        .body {
            font-size: clamp(15px, 4vw, 17px);
            line-height: 1.9;
            white-space: pre-line;
        }

        .section {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .btn {
            display: inline-block;
            padding: 12px 22px;
            border-radius: 6px;
            border: 1px solid var(--primary);
            background: var(--primary);
            color: #fff;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            min-width: 220px;
        }

        .btn:active {
            opacity: .9;
        }

        .link {
            color: var(--primary);
            text-decoration: underline;
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            font-size: 13px;
            color: var(--muted);
        }

        /* スマホ微調整 */
        @media (max-width:480px) {
            .container {
                margin: 20px auto
            }

            .card {
                padding: 22px 18px
            }
        }
    </style>
</head>

<body>

    <!-- 上部帯 -->
    <div class="header-bar">
        <div class="header-inner">
            <img class="logo" src="./image/nav_logo_master_1024.png" alt="掲示場ナビ">
            <div class="title">掲示場ナビ道</div>
        </div>
    </div>

    <!-- 本文 -->
    <div class="container">
        <div class="card">

            <p class="body">皆様

                ポスター貼り作業大変お疲れさまでした。

                「掲示場ナビ道」をご活用いただきありがとうございました。

                アプリの仕様や不具合に関して、ご意見がありましたら教えていただければ幸いです。
                次の機会があれば、改善の参考にいたします。</p>

            <p class="body" style="margin-top:16px;">
                <a class="link" href="./manual_field.html">道</a>
            </p>

            <div class="section">
                <a class="btn" href="https://forms.gle/NZqu2V7rMqJ2iKYX7" target="_blank" rel="noopener noreferrer">
                    改善フォームはこちら
                </a>
            </div>

        </div>

        <div class="footer">
            掲示場ナビ道
        </div>
    </div>

</body>

</html>
