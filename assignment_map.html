const LegendToggle = L.Control.extend({
  options: { position: 'topleft' },
  onAdd: function(){
    const div = L.DomUtil.create('div', 'legendToggle');
    legendToggleBtn = document.createElement('button');
    legendToggleBtn.type = 'button';
    div.appendChild(legendToggleBtn);
    L.DomEvent.disableClickPropagation(div);
    L.DomEvent.on(legendToggleBtn, 'click pointerup', function(e){
      L.DomEvent.stop(e);
      setLegendVisible(!legendVisible);
    });
    return div;
  }
});
